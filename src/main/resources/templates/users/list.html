<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Пользователи</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
<h1>Список пользователей</h1>

<a th:href="@{/users/new}">➕ Добавить пользователя</a>

<div style="margin-bottom: 20px; background: #f0f0f0; padding: 10px;">
    <a th:href="@{/events}" style="margin-right: 15px;">📅 Ивенты</a>
    <a th:href="@{/users}" style="margin-right: 15px;">👥 Пользователи</a>
    <a th:href="@{/venues}" style="margin-right: 15px;">📍 Места</a>
</div>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Имя</th>
        <th>Email</th>
        <th>Роль</th>
        <th>Действия</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}">1</td>
        <td th:text="${user.username}">username</td>
        <td th:text="${user.email}">email</td>
        <td th:text="${user.role?.name ?: 'нет'}">роль</td>
        <td>
            <a th:href="@{/users/{id}/edit(id=${user.id})}">✏️</a>
            <form th:action="@{/users/{id}/delete(id=${user.id})}" method="post" style="display:inline;">
                <button type="submit" onclick="return confirm('Удалить пользователя?')">🗑️</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
<p th:if="${#lists.isEmpty(users)}">Нет пользователей.</p>

</body>
</html>
