<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Участники ивента</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
<div th:if="${successMessage}" style="color: green; background: #e8f5e9; padding: 10px; margin-bottom: 10px;">
    <span th:text="${successMessage}"></span>
</div>
<div th:if="${errorMessage}" style="color: red; background: #ffebee; padding: 10px; margin-bottom: 10px;">
    <span th:text="${errorMessage}"></span>
</div>

<h1>Участники ивента: <span th:text="${event.title}">Название</span></h1>

<p>
    <a th:href="@{/events}">← К списку ивентов</a> |
    <a th:href="@{/registrations/event/{id}/add(id=${event.id})}">➕ Добавить участника</a>
</p>

<table>
    <thead>
    <tr>
        <th>Пользователь</th>
        <th>Email</th>
        <th>Дата регистрации</th>
        <th>Действие</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="reg : ${registrations}">
        <td th:text="${reg.user.username}">Имя</td>
        <td th:text="${reg.user.email}">email</td>
        <td th:text="${#temporals.format(reg.registrationDate, 'dd.MM.yyyy HH:mm')}">01.01.2025 12:00</td>
        <td>
            <form th:action="@{/registrations/event/{eventId}/user/{userId}/delete(eventId=${event.id}, userId=${reg.user.id})}"
                  method="post" style="display:inline;">
                <button type="submit" onclick="return confirm('Удалить регистрацию?')">🗑️</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<p th:if="${#lists.isEmpty(registrations)}">Пока нет зарегистрированных участников.</p>
</body>
</html>
