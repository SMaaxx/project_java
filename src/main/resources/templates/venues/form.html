<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактирование места</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .form-group { margin-bottom: 10px; }
        .error { color: red; font-size: 0.9em; }
    </style>
</head>
<body>
<h1 th:if="${venue.id == null}">Добавить место</h1>
<h1 th:if="${venue.id != null}">Редактировать место</h1>

<form th:action="${venue.id == null} ? '/venues' : '/venues/' + ${venue.id} + '/update'"
      th:object="${venue}" method="post">

    <div class="form-group">
        <label>Название:</label>
        <input type="text" th:field="*{name}" required>
    </div>
    <div class="form-group">
        <label>Адрес:</label>
        <input type="text" th:field="*{address}">
    </div>
    <div class="form-group">
        <label>Вместимость:</label>
        <input type="number" th:field="*{capacity}" min="1">
    </div>

    <button type="submit">Сохранить</button>
    <a th:href="@{/venues}">Отмена</a>
</form>
</body>
</html>
