<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ивенты</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .filter { margin-bottom: 20px; }
    </style>
</head>
<body>
<h1>Список ивентов</h1>

<!-- Фильтр по дате -->
<div class="filter">
    <form th:action="@{/events}" method="get">
        <label>От: <input type="date" name="fromDate" th:value="${fromDate}"></label>
        <label>До: <input type="date" name="toDate" th:value="${toDate}"></label>
        <button type="submit">Фильтровать</button>
        <a th:href="@{/events}">Сбросить</a>
    </form>
</div>

<a th:href="@{/events/new}">➕ Добавить ивент</a>

<!-- Навигация -->
<div style="margin-bottom: 20px; background: #f0f0f0; padding: 10px;">
    <a th:href="@{/events}" style="margin-right: 15px;">📅 Ивенты</a>
    <a th:href="@{/users}" style="margin-right: 15px;">👥 Пользователи</a>
    <a th:href="@{/venues}" style="margin-right: 15px;">📍 Места</a>
</div>

<table>
    <thead>
    <tr>
        <th>Название</th>
        <th>Дата и время</th>
        <th>Место</th>
        <th>Организатор</th>
        <th>Записано</th>
        <th>Действия</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="event : ${events}">
        <td th:text="${event.title}">Название</td>
        <td th:text="${#temporals.format(event.eventDate, 'dd.MM.yyyy HH:mm')}">01.01.2025 12:00</td>
        <td th:text="${event.venue?.name ?: 'не указано'}">Место</td>
        <td th:text="${event.organizer?.username ?: 'не указан'}">Организатор</td>
        <td>
            <span th:text="${#lists.size(event.registrations)} + ' / ' + ${event.venue?.capacity ?: '∞'}"></span>
        </td>
        <td>
            <a th:href="@{/events/{id}/edit(id=${event.id})}">✏️</a>
            <form th:action="@{/events/{id}/delete(id=${event.id})}" method="post" style="display:inline;">
                <button type="submit" onclick="return confirm('Удалить?')">🗑️</button>
            </form>
            <a th:href="@{/events/{id}/registrations(id=${event.id})}">👥 Участники</a>
        </td>
    </tr>
    </tbody>
</table>
<p th:if="${#lists.isEmpty(events)}">Пока нет ивентов.</p>

</body>
</html>
