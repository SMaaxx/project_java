<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добавить участника</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .form-group { margin-bottom: 10px; }
    </style>
</head>
<body>
<h1>Добавить участника на ивент</h1>

<form th:action="@{/registrations/event/{eventId}(eventId=${eventId})}" method="post">
    <div class="form-group">
        <label for="userId">Выберите пользователя:</label>
        <select name="userId" id="userId">
            <option th:each="user : ${users}" th:value="${user.id}" th:text="${user.username}">Пользователь</option>
        </select>
    </div>
    <button type="submit">Зарегистрировать</button>
    <a th:href="@{/events/{id}/registrations(id=${eventId})}">Отмена</a>
</form>
</body>
</html>
